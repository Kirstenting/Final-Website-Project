<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Interactive Spectator Gallery</title>
    <style>
        :root {
            --wood-light: #e3c193;
            --wood-dark: #b59263;
            --wall-bg: #f5f2e9;
            --gold-bright: #ffd700;
            --gold-mid: #d4af37;
            --gold-dark: #8a6f27;
            --bench-wood: #5c4033;
        }

        body {
            background-color: #1e1e24;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- GALLERY CABINET CONTAINER --- */
        .shadowbox-container {
            position: relative;
            width: 780px;
            height: 780px;
            background-color: var(--wall-bg);
            border: 24px solid var(--wood-light);
            border-image: linear-gradient(135deg, #f0d2a8, #9c7b50) 24;
            border-radius: 4px;
            box-shadow: 
                0 30px 70px rgba(0,0,0,0.5),
                inset 0 0 50px rgba(0,0,0,0.2),
                inset 15px 15px 25px rgba(0,0,0,0.25);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        /* Ambient Room Spotlights */
        .gallery-lights {
            display: flex;
            justify-content: space-around;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
        }

        .light-fixture {
            width: 35px;
            height: 18px;
            background: linear-gradient(#555, #999, #444);
            border-bottom: 2px solid #fff;
            position: relative;
        }

        .light-fixture::after {
            content: '';
            position: absolute;
            top: 18px;
            left: -52px;
            width: 140px;
            height: 500px;
            background: radial-gradient(ellipse at top, rgba(255,253,200,0.18) 0%, rgba(255,253,200,0) 70%);
            clip-path: polygon(40% 0%, 60% 0%, 100% 100%, 0% 100%);
        }

        /* Hanging Hearts Decoration */
        .decorations {
            position: absolute;
            top: 0;
            width: 100%;
            height: 150px;
            pointer-events: none;
            z-index: 8;
        }

        .heart {
            position: absolute;
            font-size: 26px;
            filter: drop-shadow(3px 5px 4px rgba(0,0,0,0.15));
            animation: float 4.5s ease-in-out infinite alternate;
        }
        .heart::before {
            content: '|';
            position: absolute;
            bottom: 85%;
            left: 45%;
            font-size: 14px;
            color: #cc4444;
            opacity: 0.5;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(-3deg); }
            100% { transform: translateY(10px) rotate(3deg); }
        }

        /* Wall Grid Exhibition Space */
        .art-wall {
            position: relative;
            width: 100%;
            height: 540px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Intricate Baroque Gold Frames */
        .painting-frame {
            background-color: #111;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 10px solid var(--gold-mid);
            outline: 3px double var(--gold-bright);
            outline-offset: -6px;
            box-shadow: 
                4px 10px 20px rgba(0,0,0,0.35), 
                inset 0 0 0 4px var(--gold-dark),
                inset 0 0 12px 6px rgba(0,0,0,0.8);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
        }

        .painting-frame:hover {
            transform: scale(1.08) translateY(-6px);
            box-shadow: 8px 20px 30px rgba(0,0,0,0.45);
            z-index: 15;
            outline-color: #fff;
        }

        .oval { border-radius: 50%; }
        .arched { border-radius: 50% 50% 12% 12% / 45% 45% 12% 12%; }

        .art-canvas {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Layout Placement Parameters */
        .pos-1 { grid-column: 2; grid-row: 2; border-width: 12px; } 
        .pos-2 { grid-column: 1; grid-row: 1; }
        .pos-3 { grid-column: 3; grid-row: 1; }
        .pos-4 { grid-column: 1; grid-row: 2; transform: rotate(-6deg); }
        .pos-4:hover { transform: scale(1.08) translateY(-6px) rotate(0deg); }
        .pos-5 { grid-column: 3; grid-row: 2; transform: rotate(6deg); }
        .pos-5:hover { transform: scale(1.08) translateY(-6px) rotate(0deg); }
        .pos-6 { grid-column: 1; grid-row: 3; }
        .pos-7 { grid-column: 2; grid-row: 3; }
        .pos-8 { grid-column: 3; grid-row: 3; }

        /* --- VIEWING FLOOR ENVIRONMENT --- */
        .floor-stage {
            width: 100%;
            height: 110px;
            border-top: 2px solid rgba(0,0,0,0.06);
            position: relative;
            box-sizing: border-box;
            z-index: 5;
        }

        /* Museum Benches */
        .gallery-bench {
            position: absolute;
            background-color: var(--bench-wood);
            height: 22px;
            border-radius: 3px;
            box-shadow: 2px 5px 8px rgba(0,0,0,0.3);
            border-bottom: 3px solid #3d281f;
        }
        .bench-left { width: 130px; bottom: 15px; left: 60px; }
        .bench-right { width: 130px; bottom: 15px; right: 60px; }

        /* Bench Support Legs */
        .gallery-bench::before, .gallery-bench::after {
            content: '';
            position: absolute;
            top: 22px;
            width: 6px;
            height: 16px;
            background-color: #3d281f;
        }
        .gallery-bench::before { left: 15px; }
        .gallery-bench::after { right: 15px; }

        /* Figurine Spectators Structure */
        .mini-person {
            position: absolute;
            width: 16px;
            height: 52px;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(4px 4px 4px rgba(0,0,0,0.35));
        }

        .head { width: 12px; height: 12px; background-color: #ffcdb2; border-radius: 50%; position: relative; }
        .torso { width: 16px; height: 26px; border-radius: 5px 5px 0 0; margin-top: 1px; position: relative; }
        .legs { width: 12px; height: 14px; display: flex; justify-content: space-between; }
        .legs::before, .legs::after { content: ''; width: 4.5px; height: 100%; }

        /* Arm Pointing Functionality & Shapes */
        .arm {
            position: absolute;
            width: 4px;
            height: 18px;
            background-color: inherit;
            top: 2px;
            border-radius: 2px;
            transform-origin: top center;
        }
        .arm.left-arm { left: -4px; }
        .arm.right-arm { right: -4px; }

        /* Dynamic Animation Configurations */
        .pointing-up .right-arm {
            transform: rotate(-140deg);
            height: 22px;
            animation: slight-pointing 3s ease-in-out infinite alternate;
        }
        .pointing-left .left-arm {
            transform: rotate(100deg);
            height: 20px;
        }

        @keyframes slight-pointing {
            0% { transform: rotate(-140deg); }
            100% { transform: rotate(-155deg); }
        }

        /* Seated Spectators Modification Styles */
        .sitting { height: 38px; }
        .sitting .legs { height: 0px; }
        .sitting .legs::before, .sitting .legs::after {
            height: 14px; position: absolute; bottom: -14px; width: 5px;
        }
        .sitting .legs::before { left: 2px; }
        .sitting .legs::after { right: 2px; }

        /* Coordinates Placement Over Floor Layout */
        .loc-1 { bottom: 35px; left: 220px; } /* Pointing center */
        .loc-2 { bottom: 30px; left: 95px; }  /* Seated Left */
        .loc-3 { bottom: 30px; left: 140px; } /* Seated Left */
        .loc-4 { bottom: 30px; right: 110px; }/* Seated Right */
        .loc-5 { bottom: 42px; right: 230px; }/* Pointing Right guy */

        /* Wardrobe Color Profiles for Figurines */
        .p-1 .torso { background-color: #3a506b; } .p-1 .legs::before, .p-1 .legs::after { background-color: #1c2541; }
        .p-2 .torso { background-color: #e63946; } .p-2 .legs::before, .p-2 .legs::after { background-color: #2b2d42; }
        .p-3 .torso { background-color: #d4a373; } .p-3 .legs::before, .p-3 .legs::after { background-color: #5c4033; }
        .p-4 .torso { background-color: #1d3557; } .p-4 .legs::before, .p-4 .legs::after { background-color: #457b9d; }
        .p-5 .torso { background-color: #7209b7; } .p-5 .legs::before, .p-5 .legs::after { background-color: #f1faee; }

        /* --- THE DETAIL OVERLAY POPUP --- */
        .info-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #141419;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease-in-out;
            padding: 40px;
            box-sizing: border-box;
            color: #f5f5f5;
        }

        .info-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .info-layout {
            display: flex;
            gap: 45px;
            max-width: 620px;
            align-items: center;
        }

        .info-frame {
            width: 240px;
            height: 300px;
            border: 12px solid var(--gold-mid);
            outline: 4px double var(--gold-bright);
            outline-offset: -8px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.7), inset 0 0 15px rgba(0,0,0,0.9);
            flex-shrink: 0;
        }

        .info-text-box { text-align: left; }
        .info-title { font-size: 1.9rem; margin-top: 0; color: var(--gold-bright); border-bottom: 2px solid #333; padding-bottom: 12px; }
        .info-meta { font-style: italic; color: #b5b5b5; margin-bottom: 15px; font-size: 1.05rem; }
        .info-desc { line-height: 1.6; color: #cccccc; font-size: 0.95rem; }
        .back-btn { margin-top: 40px; padding: 12px 28px; background-color: transparent; border: 2px solid var(--gold-mid); color: var(--gold-mid); font-family: inherit; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .back-btn:hover { background-color: var(--gold-mid); color: #000; box-shadow: 0 0 20px rgba(212,175,55,0.4); }

        /* --- PROCEDURAL CSS MASTERPIECE CANVASES --- */
        .starry-night {
            background: linear-gradient(180deg, #0b1d3a 0%, #1c3b6f 60%, #466897 100%);
        }
        .starry-night::before {
            content: ''; position: absolute; top: 25%; left: 35%; width: 22px; height: 22px;
            background: radial-gradient(circle, #fff 10%, #ffd700 45%, transparent 70%);
        }
        .starry-night::after {
            content: ''; position: absolute; bottom: 0; right: 10%; width: 35px; height: 70px;
            background: #122418; clip-path: polygon(40% 0%, 70% 20%, 100% 100%, 0% 100%);
        }

        .sunrises {
            background: linear-gradient(180deg, #cc4444 0%, #f39c12 45%, #2c3e50 100%);
        }
        .sunrises::before {
            content: ''; position: absolute; top: 40%; left: 45%; width: 16px; height: 16px;
            background: #ff5722; border-radius: 50%; box-shadow: 0 0 12px #ffc107;
        }

        .mona {
            background: radial-gradient(circle at 50% 35%, #4a4235 0%, #1a1712 80%);
        }
        .mona::before {
            content: ''; position: absolute; top: 28%; left: 35%; width: 32px; height: 38px;
            background: #c2b299; border-radius: 50% 50% 35% 35%; box-shadow: 0 12px 0 #2b241a;
        }

        .waterlilies {
            background: linear-gradient(135deg, #16a085 0%, #2980b9 50%, #8e44ad 100%);
        }
        .waterlilies::before {
            content: ''; position: absolute; top: 60%; left: 20%; width: 25px; height: 8px;
            background: #ffb7b2; border-radius: 50%; filter: blur(1px);
        }

        .scream-art {
            background: linear-gradient(180deg, #ff4e50 0%, #f9d423 35%, #e15f41 65%, #2c3e50 100%);
        }
        .scream-art::before { content: '😱'; position: absolute; top: 42%; left: 36%; font-size: 26px; }

        .kiss-art {
            background: repeating-linear-gradient(45deg, #ffd700, #ffd700 8px, #b8860b 8px, #b8860b 16px);
        }
        .kiss-art::before {
            content: ''; position: absolute; top: 25%; left: 28%; width: 45px; height: 65px;
            background: #fff8e7; border: 1.5px solid #000; border-radius: 25px;
        }

        .venice-art {
            background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 40%, #fa709a 100%);
        }
        .venice-art::before {
            content: ''; position: absolute; bottom: 15%; left: 25%; width: 40px; height: 35px;
            background: #4a3728; clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }

        .sunflowers {
            background: #eccc68;
        }
        .sunflowers::before {
            content: '🌻'; position: absolute; top: 25%; left: 32%; font-size: 32px;
        }
    </style>
</head>
<body>

<div class="shadowbox-container">
    <div class="gallery-lights">
        <div class="light-fixture"></div>
        <div class="light-fixture"></div>
    </div>

    <div class="decorations">
        <div class="heart" style="left: 8%; color: #ff4d6d; animation-delay: 0s; top: 25px;">❤️</div>
        <div class="heart" style="left: 14%; color: #ffb3c1; animation-delay: 0.6s; top: 65px; font-size: 18px;">❤️</div>
        <div class="heart" style="left: 48%; color: #cc1133; animation-delay: 1.1s; top: 18px;">❤️</div>
        <div class="heart" style="left: 84%; color: #ffccd5; animation-delay: 0.4s; top: 45px;">❤️</div>
    </div>

    <div class="art-wall">
        <div class="painting-frame oval pos-1" onclick="openExhibit(1)">
            <div class="art-canvas starry-night"></div>
        </div>
        <div class="painting-frame arched pos-2" onclick="openExhibit(2)">
            <div class="art-canvas sunrises"></div>
        </div>
        <div class="painting-frame arched pos-3" onclick="openExhibit(3)">
            <div class="art-canvas mona"></div>
        </div>
        <div class="painting-frame pos-4" onclick="openExhibit(4)">
            <div class="art-canvas waterlilies"></div>
        </div>
        <div class="painting-frame pos-5" onclick="openExhibit(5)">
            <div class="art-canvas scream-art"></div>
        </div>
        <div class="painting-frame oval pos-6" onclick="openExhibit(6)">
            <div class="art-canvas kiss-art"></div>
        </div>
        <div class="painting-frame pos-7" onclick="openExhibit(7)">
            <div class="art-canvas venice-art"></div>
        </div>
        <div class="painting-frame oval pos-8" onclick="openExhibit(8)">
            <div class="art-canvas sunflowers"></div>
        </div>
    </div>

    <div class="floor-stage">
        <div class="gallery-bench bench-left"></div>
        <div class="gallery-bench bench-right"></div>

        <div class="mini-person p-1 loc-1 pointing-up">
            <div class="head"></div>
            <div class="torso"><div class="arm right-arm"></div></div>
            <div class="legs"></div>
        </div>
        <div class="mini-person p-5 loc-5 pointing-left">
            <div class="head"></div>
            <div class="torso"><div class="arm left-arm"></div></div>
            <div class="legs"></div>
        </div>

        <div class="mini-person p-2 loc-2 sitting">
            <div class="head"></div>
            <div class="torso"></div>
            <div class="legs"></div>
        </div>
        <div class="mini-person p-3 loc-3 sitting">
            <div class="head"></div>
            <div class="torso"></div>
            <div class="legs"></div>
        </div>
        <div class="mini-person p-4 loc-4 sitting">
            <div class="head"></div>
            <div class="torso"></div>
            <div class="legs"></div>
        </div>
    </div>

    <div class="info-screen" id="infoPanel">
        <div class="info-layout">
            <div class="info-frame" id="infoFrameCanvas"></div>
            <div class="info-text-box">
                <h2 class="info-title" id="artTitle">Masterpiece</h2>
                <div class="info-meta" id="artMeta">Artist, Year</div>
                <p class="info-desc" id="artDesc">Catalog analysis fields.</p>
            </div>
        </div>
        <button class="back-btn" onclick="closeExhibit()">Back to Gallery</button>
    </div>
</div>

<script>
    const artworkCatalog = {
        1: { title: "The Starry Night", meta: "Vincent van Gogh, 1889", desc: "Painted from his asylum room window at Saint-Rémy-de-Provence, this masterpiece captures a rich, swirling emotional sky hovering over a peaceful village framework.", class: "starry-night", shape: "50%" },
        2: { title: "Impression, Sunrise", meta: "Claude Monet, 1872", desc: "Famous for inspiring the moniker of the 'Impressionist' collective, this piece employs sketchy brushstroke dynamics to map the harbor of Le Havre during dawn.", class: "sunrises", shape: "50% 50% 12% 12% / 45% 45% 12% 12%" },
        3: { title: "Mona Lisa", meta: "Leonardo da Vinci, c. 1503–1519", desc: "The definitive portrait icon of art history, celebrated globally for the subject's subtle smirk execution and da Vinci's pioneering sfumato shading style.", class: "mona", shape: "50% 50% 12% 12% / 45% 45% 12% 12%" },
        4: { title: "Water Lilies Study", meta: "Claude Monet, 1916", desc: "Part of Monet's late-career master series, capturing the changing qualities of light reflected upon his custom water garden landscapes in Giverny.", class: "waterlilies", shape: "0px" },
        5: { title: "The Scream", meta: "Edvard Munch, 1893", desc: "An expressionist milestone illustrating a distressed silhouette underneath a blood-orange twilight sky, visualizing core existential tension.", class: "scream-art", shape: "0px" },
        6: { title: "The Kiss", meta: "Gustav Klimt, 1907–1908", desc: "The high zenith of Klimt's celebrated Golden Phase, welding gold leaf patterns, silver accents, and mosaic layers together to lock two subjects in a tight embrace.", class: "kiss-art", shape: "50%" },
        7: { title: "The Grand Canal, Venice", meta: "Claude Monet, 1908", desc: "A sublime impressionistic exercise recording atmospheric changes playing off the grand canals and palaces of Venice.", class: "venice-art", shape: "0px" },
        8: { title: "Sunflowers", meta: "Vincent van Gogh, 1888", desc: "Part of his legendary Arles execution cycle, exploring the rich, layered textural values of yellow and amber gradients using intense impasto ideas.", class: "sunflowers", shape: "50%" }
    };

    function openExhibit(id) {
        const item = artworkCatalog[id];
        
        document.getElementById('artTitle').textContent = item.title;
        document.getElementById('artMeta').textContent = item.meta;
        document.getElementById('artDesc').textContent = item.desc;
        
        const frameCanvas = document.getElementById('infoFrameCanvas');
        frameCanvas.className = "info-frame " + item.class;
        frameCanvas.style.borderRadius = item.shape;

        document.getElementById('infoPanel').classList.add('active');
    }

    function closeExhibit() {
        document.getElementById('infoPanel').classList.remove('active');
    }
</script>

</body>
</html>
